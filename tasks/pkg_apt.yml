---
- name: Ensure debian mirrors are not present
  ansible.builtin.file:
    path: /etc/apt/sources.list.d/debian.sources
    state: absent
  when:
    - not ansible_check_mode
    - not base_debian_mirrors_allowed

- name: Ensure x64 architecture is configured appropriately
  ansible.builtin.lineinfile:
    create: true
    dest: /var/lib/dpkg/arch
    group: root
    line: amd64
    mode: '0644'
    owner: root
    state: "{{ 'present' if base_apt_arch_x64 else 'absent' }}"

- name: Ensure i386 architecture is configured appropriately
  ansible.builtin.lineinfile:
    create: true
    dest: /var/lib/dpkg/arch
    group: root
    line: i386
    mode: u=rw,g=r,o=r
    owner: root
    state: "{{ 'present' if base_apt_arch_i386 else 'absent' }}"

- name: Manage default Debian repositories
  when: base_apt_remove_default_repos | bool
  block:
    - name: Remove traditional /etc/apt/sources.list
      ansible.builtin.file:
        path: /etc/apt/sources.list
        state: absent

    - name: Ensure /etc/apt/sources.list is an empty file (prevents apt warnings)
      ansible.builtin.copy:
        content: "# Managed by Ansible. Traditional sources.list is disabled.\n"
        dest: /etc/apt/sources.list
        mode: '0644'

    - name: Remove default deb822 /etc/apt/sources.list.d/debian.sources (Debian 12+)
      ansible.builtin.file:
        path: /etc/apt/sources.list.d/debian.sources
        state: absent

- name: Configure custom deb822 APT repositories
  ansible.builtin.deb822_repository:
    name: "{{ item.name }}"
    types: "{{ item.types | default(['deb']) }}"
    uris: "{{ item.uris }}"
    suites: "{{ item.suites }}"
    components: "{{ item.components | default([]) }}"
    signed_by: "{{ item.signed_by | default(omit) }}"
    architectures: "{{ item.architectures | default(omit) }}"
    state: "{{ item.state | default('present') }}"
    enabled: "{{ item.enabled | default('yes') }}"
  loop: "{{ base_apt_custom_repos }}"

- name: Update APT package cache
  ansible.builtin.apt:
    update_cache: true
  changed_when: false
  when:
    - not ansible_check_mode
  tags:
    - minimal

- name: Ensure custom distribution packages are installed
  ansible.builtin.apt:
    name: "{{ item }}"
    state: present
  loop: "{{ base_packages_distribution }}"

- name: Upgrade all packages
  ansible.builtin.apt:
    name: "*"
    state: "{{ 'latest' }}"
  when:
    - not ansible_check_mode
    - base_update_system_packages

- name: Remove unused APT packages from the cache
  ansible.builtin.apt:
    autoclean: true
  when:
    - not ansible_check_mode

- name: Remove APT packages that are no longer required
  ansible.builtin.apt:
    autoremove: true
  when:
    - not ansible_check_mode
